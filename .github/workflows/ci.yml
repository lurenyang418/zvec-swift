name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Restore native artifact
        run: scripts/build-xcframework.sh macos
      - name: Test
        run: swift test --parallel
      - name: Release build
        run: swift build -c release
      - name: Validate diff
        run: git diff --check

